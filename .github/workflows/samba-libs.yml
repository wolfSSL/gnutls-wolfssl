name: Samba-libs Test

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_samba_libs:
    name: Build wolfSSL, GnuTLS provider & Samba-libs
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        samba_ref:
          - 'master'
          - '2.4.17.12-debian'
          - 'latest-release'
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout wrapper repo (this repository)
        uses: actions/checkout@v4

      - name: Set up build tool-chain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
          git python3 python3-venv python3-dev \
          libacl1-dev libldap2-dev libpam0g-dev \
          attr krb5-user dnsutils \
          gnulib autopoint gperf gtk-doc-tools nettle-dev clang \
          libtasn1-bin libtasn1-6-dev libunistring-dev libp11-kit-dev libunbound-dev \
          liblmdb-dev libparse-yapp-perl libgpgme11-dev libjansson-dev libarchive-dev \
          libdbus-1-dev

      - name: Build wolfSSL + GnuTLS provider (setup.sh)
        run: |
          GNUTLS_INSTALL=/opt/gnutls WOLFSSL_INSTALL=/opt/wolfssl \
          ./setup.sh

      - name: Verify provider artefacts exist
        run: |
          test -d /opt/wolfssl         || { echo "wolfSSL missing";  exit 1; }
          test -d /opt/gnutls          || { echo "GnuTLS missing";   exit 1; }
          test -d /opt/wolfssl-gnutls-wrapper/lib || \
          { echo "Wrapper libs missing"; exit 1; }

      - name: Resolve Samba ref and repository
        id: ref
        run: |
          case "${{ matrix.samba_ref }}" in
          "2.4.17.12-debian")
          echo "ref=debian/2%4.17.12+dfsg-0+deb12u1" >> "$GITHUB_OUTPUT"
          echo "repo=https://salsa.debian.org/samba-team/samba.git" >> "$GITHUB_OUTPUT"
          ;;
          "latest-release")
          echo "ref=debian/2%4.22.2+dfsg-1" >> "$GITHUB_OUTPUT"
          echo "repo=https://salsa.debian.org/samba-team/samba.git" >> "$GITHUB_OUTPUT"
          ;;
          *)
          echo "ref=${{ matrix.samba_ref }}" >> "$GITHUB_OUTPUT"
          echo "repo=https://gitlab.com/samba-team/samba.git" >> "$GITHUB_OUTPUT"
          ;;
          esac

      - name: Clone Samba (${{ steps.ref.outputs.ref }})
        run: |
          git clone --depth 1 --branch "${{ steps.ref.outputs.ref }}" \
                                                                     "${{ steps.ref.outputs.repo }}" samba

      - name: Configure & build Samba-libs
        working-directory: samba
        run: |
          export PKG_CONFIG_PATH="/opt/gnutls/lib/pkgconfig:$PKG_CONFIG_PATH"
          export CPPFLAGS="-I/opt/gnutls/include $CPPFLAGS"
          export LDFLAGS="-L/opt/gnutls/lib -Wl,-rpath,/opt/gnutls/lib $LDFLAGS"
          export LD_LIBRARY_PATH="/opt/gnutls/lib:$LD_LIBRARY_PATH"
          ./configure --prefix=/opt/samba --enable-selftest
          make -j"$(nproc)"
          make install

      - name: Run quick-tests (non-FIPS)
        working-directory: samba
        run: |
          export PKG_CONFIG_PATH="/opt/gnutls/lib/pkgconfig:$PKG_CONFIG_PATH"
          export CPPFLAGS="-I/opt/gnutls/include $CPPFLAGS"
          export LDFLAGS="-L/opt/gnutls/lib -Wl,-rpath,/opt/gnutls/lib $LDFLAGS"
          export LD_LIBRARY_PATH="/opt/gnutls/lib:$LD_LIBRARY_PATH"
          make quicktest -j"$(nproc)"
